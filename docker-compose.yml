  # ─── Service Booking ───────────────────────────────────
  booking-service:
    build: services/booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
    depends_on:
      - booking-db
    networks:
      - app-network

  booking-db:
    image: postgres:16-alpine
    ports:
      - "${DB_BOOKING_SERVICE_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_BOOKING_NAME:-booking_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  booking-db-data:
