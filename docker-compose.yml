# Docker Compose — Multi-container orchestration
# Run: docker compose up --build
# Docs: https://docs.docker.com/compose/

services:
  # ─── Frontend ────────────────────────────────────
#  frontend:
#    build: ./frontend
#    ports:
#      - "${FRONTEND_PORT:-3000}:3000"
#    depends_on:
#      - gateway
#    networks:
#      - app-network

  # ─── API Gateway ─────────────────────────────────
  kong:
    build: ./gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PLUGINS: bundled
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS_EUREKA_CONFIG_EUREKA_URL: ${EUREKA_URL}
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    depends_on:
      - eureka-server
    networks:
      - app-network

  # ─── Service Booking ───────────────────────────────────
  booking-service:
    build: services/booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:postgresql://booking-db:5432/${DB_BOOKING_NAME:-booking_db}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
    depends_on:
      - booking-db
    networks:
      - app-network

  booking-db:
    image: postgres:16-alpine
    ports:
      - "${DB_BOOKING_SERVICE_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_BOOKING_NAME:-booking_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=logical"]
    networks:
      - app-network

  # ─── Service ACCOUNT ───────────────────────────────────
  account-service:
    build: services/account-service
    ports:
      - "${ACCOUNT_SERVICE_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:postgresql://account-db:5432/${DB_ACCOUNT_NAME:-account_db}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - JWT_SECRET=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_ACCESS=${JWT_EXPIRATION_ACCESS}
      - JWT_EXPIRATION_REFRESH=${JWT_EXPIRATION_REFRESH}
    depends_on:
      - account-db
    networks:
      - app-network

  account-db:
    image: postgres:16-alpine
    ports:
      - "${DB_ACCOUNT_SERVICE_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${DB_ACCOUNT_NAME:-account_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - account-db-data:/var/lib/postgresql/data
    command: [ "postgres", "-c", "wal_level=logical" ]
    networks:
      - app-network


  # ─── Service TOUR ───────────────────────────────────
  tour-service:
    build: services/tour-service
    ports:
      - "${TOUR_SERVICE_PORT:-8082}:8082"
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:mysql://tour-db:3306/${DB_TOUR_NAME:-tour_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
    depends_on:
      tour-db:
        condition: service_healthy
    networks:
      - app-network

  tour-db:
    image: mysql:8.0
    ports:
      - "${DB_TOUR_SERVICE_PORT:-3309}:3306"
    environment:
      MYSQL_DATABASE: ${DB_TOUR_NAME:-tour_db}
      MYSQL_USER: ${DB_USER:-postgres}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - tour-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - app-network


  # ─── Service INVENTORY ───────────────────────────────────
  inventory-service:
    build: services/inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT:-8083}:8083"
    env_file:
      - .env
    environment:
      - DB_URL=jdbc:mysql://inventory-db:3306/${DB_INVENTORY_NAME:-inventory_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
    depends_on:
      inventory-db:
        condition: service_healthy
    networks:
      - app-network

  inventory-db:
    image: mysql:8.0
    ports:
      - "${DB_INVENTORY_SERVICE_PORT:-3308}:3306"
    environment:
      MYSQL_DATABASE: ${DB_INVENTORY_NAME:-inventory_db}
      MYSQL_USER: ${DB_USER:-postgres}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - inventory-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - app-network

  # ─── Service DOCUMENT ───────────────────────────────────
  document-service:
    build: services/document-service
    ports:
      - "${DOCUMENT_SERVICE_PORT:-8084}:8084"
    env_file:
      - .env
    networks:
      - app-network

  # ─── Service NOTIFICATION ───────────────────────────────────
  notification-service:
    build: services/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8085}:8085"
    env_file:
      - .env
    networks:
      - app-network


  # ─── Shared Infrastructure
  eureka-server:
    build:
      context: services/eureka-server
    ports:
    - "${EUREKA_SERVER_PORT}:${EUREKA_SERVER_PORT}"
    environment:
    - EUREKA_HOSTNAME=${EUREKA_SERVER_HOST}
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:${ZOOKEEPER_VERSION:-7.5.0}
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:${KAFKA_VERSION:-7.5.0}
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_PORT:-2181}

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:${KAFKA_PORT:-9092},PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:${KAFKA_UI_VERSION:-latest}
    container_name: kafka-ui
    ports:
      - "${KAFKA_UI_PORT:-8989}:8080" # Truy cập qua http://localhost:8989
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: booking-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - app-network

  connect:
    image: debezium/connect:${DEBEZIUM_VERSION:-2.5}
    ports:
      - "8087:8087"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      - kafka
      - booking-db
    networks:
      - app-network


networks:
  app-network:
    driver: bridge

volumes:
  booking-db-data:
  account-db-data:
  tour-db-data:
  inventory-db-data:
