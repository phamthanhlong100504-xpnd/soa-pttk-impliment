# Docker Compose — Multi-container orchestration
# Run: docker compose up --build
# Docs: https://docs.docker.com/compose/

services:
  # ─── Frontend ────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      - VITE_API_BASE_URL=http://kong:8000
    depends_on:
      - kong
    networks:
      - app-network

  # ─── API Gateway (KONG) ─────────────────────────────────
  kong:
    build: ./gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PLUGINS: bundled
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS_EUREKA_CONFIG_EUREKA_URL: ${EUREKA_URL}
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml
    depends_on:
      - eureka-server
    networks:
      - app-network

  # ─── SERVICE BOOKING ────────────────────────────────────
  booking-service:
    build: services/booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8080 
      - DB_URL=jdbc:postgresql://db:5432/${DB_BOOKING_NAME:-booking_db}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ─── SERVICE ACCOUNT ────────────────────────────────────
  account-service:
    build: services/account-service
    ports:
      - "${ACCOUNT_SERVICE_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8081 
      - DB_URL=jdbc:postgresql://db:5432/${DB_ACCOUNT_NAME:-account_db}
      - JWT_SECRET=${JWT_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ─── SERVICE TOUR ─────────────────────────────────────
  tour-service:
    build: services/tour-service
    ports:
      - "${TOUR_SERVICE_PORT:-8082}:8082"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8082 
      - DB_URL=jdbc:postgresql://db:5432/${DB_TOUR_NAME:-tour_db}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ─── SERVICE INVENTORY ────────────────────────────────
  inventory-service:
    build: services/inventory-service
    ports:
      - "${INVENTORY_SERVICE_PORT:-8083}:8083"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8083 
      - DB_URL=jdbc:postgresql://db:5432/${DB_INVENTORY_NAME:-inventory_db}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ─── SERVICE BOOKING-TOUR (Temporal Client) ────────────
  booking-tour-service:
    build: services/booking-tour-service
    ports:
      - "${BOOKING_TOUR_SERVICE_PORT:-8090}:8090"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8090 
      - TEMPORAL_URL=temporal:7233
    depends_on:
      - temporal
    networks:
      - app-network

  # ─── TEMPORAL SERVER & UI ──────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.23.1
    container_name: temporal-server
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PWD=${DB_PASSWORD:-123456}
      - POSTGRES_SEEDS=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: temporal-ui
    ports:
      - "8091:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - app-network

  # ─── SERVICE DOCUMENT & NOTIFICATION ──────────────────
  document-service:
    build: services/document-service
    ports:
      - "${DOCUMENT_SERVICE_PORT:-8084}:8084"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8084 
    networks:
      - app-network

  notification-service:
    build: services/notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8085}:8085"
    env_file:
      - .env
    environment:
      - SERVER_PORT=8085 
    networks:
      - app-network

  # ─── SHARED INFRASTRUCTURE ──────────────────────────────
  eureka-server:
    build:
      context: services/eureka-server
    ports:
      - "${EUREKA_SERVER_PORT:-8761}:8761"
    environment:
      - EUREKA_HOSTNAME=${EUREKA_SERVER_HOST:-localhost}
    networks:
      - app-network

  # ─── DATABASE ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: booking_db,account_db,tour_db,inventory_db,temporal
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    command: ["postgres", "-c", "wal_level=logical"]
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


