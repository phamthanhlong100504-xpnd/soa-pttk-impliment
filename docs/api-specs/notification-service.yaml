# ============================================
# Notification Service — OpenAPI 3.0 Specification
# Docs: https://swagger.io/specification/
# ============================================
openapi: 3.0.3
info:
  title: Notification Service API
  description: |
    API specification for Notification Service.
    Handles sending booking confirmation emails with tour details using SMTP (JavaMailSender + Thymeleaf templates).
    Runs asynchronously via Spring @Async.
  version: 1.0.0

servers:
  - url: http://localhost:8085
    description: Local development
  - url: http://notification-service:8085
    description: Docker Compose network

paths:
  /api/v1/notifications/booking-tickets/send:
    post:
      summary: Gửi email xác nhận đặt tour
      operationId: sendBookingConfirmationEmail
      tags:
        - Notification
      description: |
        Gửi email xác nhận đặt tour cho khách hàng.
        Email chứa thông tin booking: mã vé, tên tour, số lượng, danh sách hành khách, dịch vụ tùy chọn, tổng giá.
        Sử dụng Thymeleaf template (confirmation.html) để render nội dung email HTML.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Email đã được đưa vào hàng đợi gửi thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Email đã được đưa vào hàng đợi gửi thành công"
                  bookingId:
                    type: string
                    example: "BK-20260501-001"
        '400':
          description: Email người nhận không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Lỗi hệ thống khi gửi mail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    EmailRequest:
      type: object
      required:
        - toEmail
        - subject
        - bookingId
      properties:
        toEmail:
          type: string
          format: email
          description: Email người nhận
          example: customer@example.com
        customerName:
          type: string
          description: Tên khách hàng
          example: "Nguyễn Văn A"
        subject:
          type: string
          description: Tiêu đề email
          example: "Đặt chỗ tour du lịch"
        bookingId:
          type: string
          description: Mã đơn đặt tour
          example: "BK-20260501-001"
        accountId:
          type: string
          format: uuid
        tourScheduleId:
          type: string
          format: uuid
        tourName:
          type: string
          example: "Tour Đà Nẵng - Hội An 3N2Đ"
        quantity:
          type: integer
          example: 2
        confirmedSlots:
          type: integer
          description: Số chỗ đã xác nhận
          example: 2
        totalPrice:
          type: integer
          format: int64
          example: 5990000
        passengers:
          type: array
          items:
            $ref: '#/components/schemas/PassengerResponse'
        optionalServices:
          type: array
          items:
            $ref: '#/components/schemas/BookingOptionalServiceResponse'

    PassengerResponse:
      type: object
      properties:
        fullName:
          type: string
          example: "Nguyễn Văn A"

    BookingOptionalServiceResponse:
      type: object
      properties:
        serviceName:
          type: string
          example: "Bảo hiểm du lịch"
        quantity:
          type: integer
          example: 2
        priceType:
          type: string
          example: "PER_PERSON"

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: "Email người nhận không được để trống"
